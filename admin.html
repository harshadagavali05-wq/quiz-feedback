<!DOCTYPE html>
<html>
<head>
    <title>Admin - Secure Feedback</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 40px; background: #f4f7f6; }
        
        /* Login Overlay */
        #loginOverlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #667eea; display: flex; justify-content: center; align-items: center;
            z-index: 1000;
        }
        .login-box { background: white; padding: 40px; border-radius: 12px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
        
        /* Table Styles */
        #adminContent { display: none; } /* Hidden by default */
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 8px; overflow: hidden; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #eee; }
        th { background: #764ba2; color: white; }
        
        input[type="password"] { padding: 10px; width: 200px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 5px; }
        button { background: #764ba2; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; }
        .back-btn { margin-bottom: 20px; display: inline-block; text-decoration: none; color: #667eea; font-weight: bold; }
    </style>
</head>
<body>

    <div id="loginOverlay">
        <div class="login-box">
            <h2>Admin Login</h2>
            <input type="password" id="adminPass" placeholder="Enter Password"><br>
            <button onclick="checkPassword()">Login</button>
            <p id="error" style="color:red; font-size:12px; margin-top:10px;"></p>
        </div>
    </div>

    <div id="adminContent">
        <a href="index.html" class="back-btn">← Back to Form</a>
        <h2>Quiz Competition Results</h2>
        <table id="feedbackTable">
            <thead>
                <tr>
                    <th>Date</th>
                    <th>Name</th>
                    <th>Dept</th>
                    <th>Difficulty</th>
                    <th>Suggestion</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
        <br>
        <button onclick="clearData()" style="background: #e53e3e;">Clear All Feedback</button>
    </div>

<script>
    const ADMIN_PASSWORD = "admin123"; // <-- CHANGE YOUR PASSWORD HERE

    function checkPassword() {
        const passInput = document.getElementById("adminPass").value;
        if (passInput === ADMIN_PASSWORD) {
            document.getElementById("loginOverlay").style.display = "none";
            document.getElementById("adminContent").style.display = "block";
            loadData();
        } else {
            document.getElementById("error").innerText = "❌ Incorrect Password";
        }
    }

    function loadData() {
        const feedbackTable = document.querySelector("#feedbackTable tbody");
        const data = JSON.parse(localStorage.getItem("quizFeedback")) || [];
        feedbackTable.innerHTML = ""; // Clear current list

        if (data.length === 0) {
            feedbackTable.innerHTML = "<tr><td colspan='5' style='text-align:center'>No feedback found.</td></tr>";
        } else {
            data.forEach(item => {
                let row = `<tr>
                    <td>${item.date}</td>
                    <td>${item.name}</td>
                    <td>${item.dept}</td>
                    <td>${item.diff}</td>
                    <td>${item.msg}</td>
                </tr>`;
                feedbackTable.innerHTML += row;
            });
        }
    }

    function clearData() {
        if(confirm("Are you sure you want to delete ALL feedback?")) {
            localStorage.removeItem("quizFeedback");
            loadData();
        }
    }
</script>

</body>
</html>
